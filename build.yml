name: Compile AutoClicker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Compile AutoClicker
        shell: msys2 {0}
        run: |
          gcc AutoClicker.c -o AutoClicker.exe -luser32 -lkernel32 -lm
          echo "Compilation successful!"

      - name: Upload compiled EXE
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker
          path: AutoClicker.exe
